<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card card-glass shadow-lg p-4">
      <div class="card-body">
        
        <div class="text-center mb-4">
          <div class="d-inline-flex align-items-center justify-content-center bg-light rounded-circle p-3 mb-2" style="width: 72px; height: 72px; color: var(--primary);">
            <i class="bi bi-shield-lock-fill display-6"></i>
          </div>
          <h3 class="fw-bold mt-2">Restablecer contraseña</h3>
          <p class="text-muted small">
            Ingresa tu nueva contraseña para volver a acceder a tu cuenta.
          </p>
        </div>

        @if (errorMsg()) {
          <div class="alert alert-danger py-2 small d-flex align-items-center mb-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2 fs-6"></i>
            <div>{{ errorMsg() }}</div>
          </div>
        }

        <form (ngSubmit)="submit()" #resetForm="ngForm">
          
          <div class="mb-3">
            <label class="form-label">Nueva contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input class="form-control" type="password" placeholder="Mínimo 8 caracteres"
                     [(ngModel)]="password" name="password" required minlength="8" 
                     #passInput="ngModel" [class.is-invalid]="passInput.invalid && passInput.touched" />
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label">Confirmar nueva contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input class="form-control" type="password" placeholder="Repite la contraseña"
                     [(ngModel)]="confirmPassword" name="confirmPassword" required 
                     #confirmInput="ngModel" />
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 d-flex align-items-center justify-content-center"
                  [disabled]="resetForm.invalid || !token || loading()">
            @if (loading()) {
              <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              Restableciendo...
            @} @else {
              <i class="bi bi-check-circle me-1"></i> Restablecer contraseña
            @}
          </button>
        </form>

        <div class="mt-4 text-center border-top pt-3">
          <a routerLink="/login" class="text-decoration-none small fw-semibold">
            Volver al inicio de sesión
          </a>
        </div>

      </div>
    </div>
  </div>
</div>
